<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gustazzk - O Rei da Sensibilidade</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Fundo Animado com RGB Azul e Roxo */
            background: linear-gradient(125deg, #0d001a, #001133, #1a0033, #002244);
            background-size: 400% 400%;
            animation: rgbBg 10s ease infinite;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        @keyframes rgbBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.3), 0 0 30px rgba(0, 191, 255, 0.2);
        }

        /* Cabeçalho pedido */
        .header-title {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 2px;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .header-subtitle {
            font-size: 16px;
            color: #d8b4fe;
            margin-bottom: 30px;
            font-weight: bold;
            text-shadow: 0 0 8px #8a2be2;
        }

        /* Formulários e Inputs */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #a3e635;
            font-size: 14px;
            font-weight: 600;
        }

        input[type="password"], select {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #8a2be2;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input[type="password"]:focus, select:focus {
            border-color: #00ffff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #8a2be2, #00ffff);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
        }

        /* Telas */
        .screen {
            display: none;
        }

        .active {
            display: block;
        }

        /* Resultado da Sensi */
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 12px;
            border-left: 4px solid #00ffff;
            text-align: left;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-item {
            margin-bottom: 8px;
            font-size: 16px;
        }

        .result-item span {
            color: #00ffff;
            font-weight: bold;
        }

        .error-msg {
            color: #ff4444;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-title">gustazzk</div>
        <div class="header-subtitle">O rei das sensibilidade🚀</div>

        <div id="login-screen" class="screen active">
            <div class="input-group">
                <label for="password">Digite a senha para acessar:</label>
                <input type="password" id="password" placeholder="Sua senha aqui...">
                <div id="error-message" class="error-msg">Senha incorreta! Tente novamente.</div>
            </div>
            <button onclick="verificarSenha()">Entrar no Painel</button>
        </div>

        <div id="main-screen" class="screen">
            <div class="input-group">
                <label for="tipo-sensi">Escolha o Tipo de Sensibilidade:</label>
                <select id="tipo-sensi">
                    <option value="alta">Alta (Foco em InstaPlayer)</option>
                    <option value="media">Média (Equilibrada/Campeonato)</option>
                    <option value="baixa">Baixa (Foco em % de Capa/Armas de um tiro)</option>
                </select>
            </div>

            <div class="input-group">
                <label for="com-dpi">Configuração de DPI:</label>
                <select id="com-dpi">
                    <option value="sim">Com DPI (Celular leve)</option>
                    <option value="nao">Sem DPI (Padrão do Jogo)</option>
                </select>
            </div>

            <button onclick="gerarSensibilidade()">Gerar Melhor Sensi 🔥</button>

            <div id="result" class="result-box">
                <div class="result-item">Geral: <span id="res-geral">0</span>/200</div>
                <div class="result-item">Ponto Vermelho: <span id="res-red">0</span>/200</div>
                <div class="result-item">Mira 2x: <span id="res-2x">0</span>/200</div>
                <div class="result-item">Mira 4x: <span id="res-4x">0</span>/200</div>
                <div class="result-item">AWM: <span id="res-awm">0</span>/200</div>
                <div class="result-item" id="dpi-row">DPI recomendada: <span id="res-dpi">0</span></div>
                <div class="result-item" style="color: #a3e635; margin-top: 10px; font-size: 13px; text-align: center;">
                    ⚡ Sensi calibrada pelo Rei Gustazzk!
                </div>
            </div>
        </div>
    </div>

    <script>
        // Função para validar a senha
        function verificarSenha() {
            const senhaInput = document.getElementById('password').value;
            const erroMsg = document.getElementById('error-message');
            
            if (senhaInput === 'gustazzk') {
                document.getElementById('login-screen').classList.remove('active');
                document.getElementById('main-screen').classList.add('active');
            } else {
                erroMsg.style.display = 'block';
            }
        }

        // Função que gera números aleatórios
        function gerarRandom(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function gerarSensibilidade() {
            const tipoSensi = document.getElementById('tipo-sensi').value;
            const comDpi = document.getElementById('com-dpi').value;
            
            let geral, red, m2x, m4x, awm, dpi;

            // Lógica ajustada para a escala de 0 a 200
            if (tipoSensi === 'alta') {
                geral = gerarRandom(180, 200);
                red = gerarRandom(175, 198);
                m2x = gerarRandom(180, 200);
                m4x = gerarRandom(170, 195);
            } else if (tipoSensi === 'media') {
                geral = gerarRandom(140, 179);
                red = gerarRandom(130, 174);
                m2x = gerarRandom(140, 179);
                m4x = gerarRandom(135, 169);
            } else { // Baixa
                geral = gerarRandom(80, 139);
                red = gerarRandom(75, 129);
                m2x = gerarRandom(80, 139);
                m4x = gerarRandom(70, 134);
            }

            awm = gerarRandom(50, 120);

            // Exibir os dados na tela
            document.getElementById('res-geral').innerText = geral;
            document.getElementById('res-red').innerText = red;
            document.getElementById('res-2x').innerText = m2x;
            document.getElementById('res-4x').innerText = m4x;
            document.getElementById('res-awm').innerText = awm;

            // Lógica da DPI
            const dpiRow = document.getElementById('dpi-row');
            if (comDpi === 'sim') {
                if (tipoSensi === 'alta') dpi = gerarRandom(720, 960);
                else if (tipoSensi === 'media') dpi = gerarRandom(550, 710);
                else dpi = gerarRandom(420, 540);
                
                document.getElementById('res-dpi').innerText = dpi;
                dpiRow.style.display = 'block';
            } else {
                dpiRow.style.display = 'none';
            }

            // Mostrar o box de resultado com animação
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
